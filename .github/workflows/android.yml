name: Build Android APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Dependencies
        run: |
          npm install
          npm install @capacitor/cli @capacitor/core @capacitor/android @capacitor/assets

      - name: Initialize Android Project
        run: |
          # 1. Создаем папку android
          npx cap add android
          
          # 2. Генерируем иконки. 
          # Если твой файл называется 1775165917303.png, мы временно переименуем его в icon.png
          if [ -f "1775165917303.png" ]; then 
            cp 1775165917303.png icon.png
            npx capacitor-assets generate --android
          fi
          
          # 3. Копируем google-services.json (без него Firebase не заведется)
          if [ -f "google-services.json" ]; then 
            cp google-services.json android/app/
          fi
          
          # 4. Синхронизируем код из www
          npx cap sync android

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Build APK with Gradle
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: LookUp-Final-App
          path: android/app/build/outputs/apk/debug/app-debug.apk
