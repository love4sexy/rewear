<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>YAVITO — Full Version</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <style>
        :root {
            --bg: #f4f4f4; --card: #ffffff; --text: #222; --blue: #0077ff; 
            --green: #00cc66; --red: #ff3b30; --gray: #8e8e93;
        }
        body.dark {
            --bg: #121212; --card: #1e1e1e; --text: #efefef; --gray: #636366;
        }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 80px; transition: 0.3s; }
        
        /* HEADER & SEARCH */
        header { background: var(--card); padding: 10px 15px; border-bottom: 1px solid var(--gray); position: sticky; top: 0; z-index: 1000; display: flex; flex-direction: column; gap: 10px; }
        .head-top { display: flex; justify-content: space-between; align-items: center; }
        .search-bar { display: flex; gap: 5px; }
        .search-bar input { flex: 1; padding: 10px; border-radius: 8px; border: 1px solid var(--gray); background: var(--bg); color: var(--text); }
        
        .logo { font-size: 22px; font-weight: 900; color: var(--blue); cursor: pointer; text-decoration: none; }
        .theme-btn { font-size: 20px; cursor: pointer; }

        /* NAVIGATION */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: var(--card); display: flex; border-top: 1px solid var(--gray); height: 70px; z-index: 1001; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 11px; cursor: pointer; color: var(--gray); }
        .nav-item.active { color: var(--blue); }
        .nav-item i { font-style: normal; font-size: 24px; margin-bottom: 2px; }

        /* CARDS */
        .page { display: none; padding: 15px; max-width: 1000px; margin: 0 auto; }
        .active-page { display: block; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; }
        .card { background: var(--card); border-radius: 12px; overflow: hidden; cursor: pointer; border: 1px solid rgba(0,0,0,0.1); }
        .card img { width: 100%; height: 150px; object-fit: cover; }
        .card-body { padding: 10px; }
        .price { font-size: 18px; font-weight: bold; margin-bottom: 5px; }

        /* AD DETAIL (LIKE AVITO) */
        .ad-view-container { background: var(--card); border-radius: 15px; overflow: hidden; }
        .ad-gallery { display: flex; overflow-x: auto; gap: 5px; height: 300px; }
        .ad-gallery img { height: 100%; width: 100%; object-fit: contain; background: #000; flex-shrink: 0; }
        .ad-info { padding: 20px; }
        .seller-card { display: flex; align-items: center; gap: 15px; padding: 15px; background: var(--bg); border-radius: 10px; margin: 15px 0; }
        
        /* ADMIN PANEL */
        .admin-section { background: #fff3cd; color: #856404; padding: 15px; border-radius: 10px; margin-bottom: 20px; border: 1px solid #ffeeba; }

        /* BUTTONS */
        .btn { padding: 12px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; transition: 0.2s; text-align: center; display: block; width: 100%; box-sizing: border-box; }
        .btn-blue { background: var(--blue); color: white; }
        .btn-green { background: var(--green); color: white; }
        .btn-red { background: var(--red); color: white; }

        /* MODALS */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 2000; align-items: center; justify-content: center; }
        .modal-content { background: var(--card); width: 90%; max-width: 500px; padding: 20px; border-radius: 15px; max-height: 85vh; overflow-y: auto; }

        /* CHAT */
        .chat-win { height: 350px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; padding: 10px; background: var(--bg); border-radius: 10px; }
        .msg { padding: 8px 12px; border-radius: 12px; max-width: 80%; font-size: 14px; }
        .msg.my { align-self: flex-end; background: var(--blue); color: white; }
        .msg.other { align-self: flex-start; background: var(--gray); color: white; }

        @media (max-width: 600px) {
            .head-top .head-icons { display: none; }
        }
    </style>
</head>
<body id="body">

<header>
    <div class="head-top">
        <div class="logo" onclick="showPage('ads')">YAVITO</div>
        <div style="display: flex; gap: 15px; align-items: center;">
            <span class="theme-btn" onclick="toggleTheme()">🌓</span>
            <div class="head-icons" style="display: flex; gap: 15px;">
                <span onclick="showPage('chats')">💬</span>
                <span onclick="showPage('profile')">👤</span>
            </div>
        </div>
    </div>
    <div class="search-bar">
        <input type="text" id="searchInput" placeholder="Поиск объявлений..." oninput="searchAds()">
    </div>
</header>

<div id="page-ads" class="page active-page">
    <div id="admin-panel" style="display:none">
        <div class="admin-section">
            <b>🛡️ Кабинет администратора</b>
            <div id="mod-list" style="margin-top:10px;"></div>
        </div>
    </div>
    <div id="ads-list" class="grid"></div>
</div>

<div id="page-view" class="page">
    <button onclick="showPage('ads')" style="margin-bottom:10px; background:none; border:none; color:var(--blue); font-weight:bold;">← Назад</button>
    <div id="ad-view-content" class="ad-view-container"></div>
</div>

<div id="page-chats" class="page">
    <h3>Сообщения</h3>
    <div id="support-entry" class="seller-card" onclick="openSupport()" style="cursor:pointer; border-left: 5px solid var(--blue);">
        <div>🆘</div>
        <div><b>Служба поддержки</b><br><small>Задать вопрос админу</small></div>
    </div>
    <div id="chats-list"></div>
</div>

<div id="page-profile" class="page">
    <div style="text-align:center; position: relative;">
        <label>
            <img id="user-avatar" src="https://cdn-icons-png.flaticon.com/512/149/149071.png" style="width:100px; height:100px; border-radius:50%; object-fit:cover; cursor:pointer;">
            <input type="file" id="avatarInput" style="display:none" onchange="uploadAvatar(this)">
        </label>
        <div id="avatar-status" style="font-size:12px; margin-top:5px;"></div>
        <h2 id="user-name-display" style="margin:10px 0;">Загрузка...</h2>
        <button class="btn" style="width:auto; display:inline-block; font-size:12px;" onclick="editName()">Изм. имя</button>
        <div id="user-rating" style="color: #ff9500; font-weight:bold; margin-top:10px;">⭐ 0.0 (0 отзывов)</div>
    </div>
    <hr style="margin:20px 0; opacity:0.2;">
    <h3>Мои объявления</h3>
    <div id="my-ads-list"></div>
    <button class="btn btn-red" style="margin-top:30px;" onclick="auth.signOut()">Выйти</button>
</div>

<div id="modal-ad" class="modal">
    <div class="modal-content">
        <h3 id="ad-modal-title">Подать объявление</h3>
        <input type="file" id="ad-files" multiple accept="image/*" style="margin-bottom:10px;">
        <input type="text" id="ad-title" placeholder="Название">
        <input type="number" id="ad-price" placeholder="Цена (₽)">
        <select id="ad-cat">
            <option value="Одежда">Одежда</option>
            <option value="Электроника">Электроника</option>
            <option value="Дом">Дом</option>
            <option value="Транспорт">Транспорт</option>
        </select>
        <input type="text" id="ad-loc" placeholder="Местоположение (город)">
        <textarea id="ad-desc" rows="4" placeholder="Описание"></textarea>
        <button class="btn btn-blue" id="submitAdBtn" onclick="saveAd()">Опубликовать</button>
        <button class="btn" onclick="closeModal('modal-ad')">Отмена</button>
    </div>
</div>

<div id="modal-chat" class="modal">
    <div class="modal-content">
        <h3 id="chat-header">Чат</h3>
        <div id="chat-messages" class="chat-win"></div>
        <div style="display:flex; gap:5px; margin-top:10px;">
            <input type="text" id="chat-input" placeholder="Сообщение..." style="flex:1; padding:10px; border-radius:8px; border:1px solid var(--gray);">
            <button class="btn btn-blue" style="width:60px;" onclick="sendMessage()">➤</button>
        </div>
        <button class="btn" onclick="closeModal('modal-chat')" style="margin-top:10px;">Закрыть</button>
    </div>
</div>

<nav class="bottom-nav">
    <div class="nav-item active" onclick="showPage('ads')"><i>🏠</i>Главная</div>
    <div class="nav-item" onclick="openModal('modal-ad')"><i>➕</i>Подать</div>
    <div class="nav-item" onclick="showPage('chats')"><i>💬</i>Чаты</div>
    <div class="nav-item" onclick="showPage('profile')"><i>👤</i>Профиль</div>
</nav>

<script>
    // КОНФИГ
    const firebaseConfig = {
        apiKey: "AIzaSyClUclRijtD4zQaJCqyOY6cU5db6eh_BgA",
        authDomain: "yavito-7930e.firebaseapp.com",
        projectId: "yavito-7930e",
        storageBucket: "yavito-7930e.firebasestorage.app",
        messagingSenderId: "560885508854",
        appId: "1:560885508854:web:f7c22cebdfde2279dedad7"
    };
    const IMGBB_KEY = 'd3e0d626da4b69b9cadd392fe36efeac';
    const ADMIN_EMAIL = "sobakastalina123@gmail.com";

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    let currentUser = null;
    let currentChatId = null;
    let allAds = [];

    // --- ИНИЦИАЛИЗАЦИЯ ---
    auth.onAuthStateChanged(user => {
        if (user) {
            currentUser = user;
            initUserRecord();
            if(user.email === ADMIN_EMAIL) {
                document.getElementById('admin-panel').style.display = 'block';
                loadModerationQueue();
            }
            loadAds();
            loadProfile();
        } else {
            auth.signInWithPopup(new firebase.auth.GoogleAuthProvider());
        }
    });

    async function initUserRecord() {
        const doc = await db.collection('users').doc(currentUser.uid).get();
        if(!doc.exists) {
            await db.collection('users').doc(currentUser.uid).set({
                name: currentUser.displayName,
                avatar: 'https://cdn-icons-png.flaticon.com/512/149/149071.png',
                avatarStatus: 'active',
                rating: 0,
                reviews: 0
            });
        }
        db.collection('users').doc(currentUser.uid).onSnapshot(s => {
            const data = s.data();
            document.getElementById('user-name-display').innerText = data.name;
            document.getElementById('user-avatar').src = data.avatar;
            document.getElementById('avatar-status').innerText = data.avatarStatus === 'pending' ? '⌛ Аватар на проверке' : '';
        });
    }

    // --- ТЕМЫ ---
    function toggleTheme() {
        document.getElementById('body').classList.toggle('dark');
        localStorage.setItem('theme', document.getElementById('body').classList.contains('dark') ? 'dark' : 'light');
    }
    if(localStorage.getItem('theme') === 'dark') document.getElementById('body').classList.add('dark');

    // --- ОБЪЯВЛЕНИЯ ---
    async function uploadToImgBB(file) {
        let formData = new FormData();
        formData.append("image", file);
        const res = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_KEY}`, { method: "POST", body: formData });
        const data = await res.json();
        return data.data.url;
    }

    async function saveAd() {
        const btn = document.getElementById('submitAdBtn');
        btn.disabled = true; btn.innerText = 'Загрузка...';

        const files = document.getElementById('ad-files').files;
        let photos = [];
        for(let f of files) photos.push(await uploadToImgBB(f));

        const ad = {
            title: document.getElementById('ad-title').value,
            price: document.getElementById('ad-price').value,
            cat: document.getElementById('ad-cat').value,
            loc: document.getElementById('ad-loc').value,
            desc: document.getElementById('ad-desc').value,
            photos: photos,
            authorId: currentUser.uid,
            authorName: currentUser.displayName,
            status: 'pending',
            createdAt: new Date()
        };

        await db.collection('ads').add(ad);
        alert('Объявление отправлено на модерацию!');
        location.reload();
    }

    function loadAds() {
        db.collection('ads').where('status', '==', 'active').orderBy('createdAt', 'desc').onSnapshot(snap => {
            allAds = [];
            snap.forEach(doc => allAds.push({id: doc.id, ...doc.data()}));
            renderAds(allAds);
        });
    }

    function renderAds(list) {
        let html = '';
        list.forEach(ad => {
            html += `
                <div class="card" onclick="viewAd('${ad.id}')">
                    <img src="${ad.photos[0] || ''}">
                    <div class="card-body">
                        <div class="price">${ad.price} ₽</div>
                        <div style="font-size:14px; height:40px; overflow:hidden;">${ad.title}</div>
                        <div style="color:var(--gray); font-size:12px; margin-top:5px;">${ad.loc}</div>
                    </div>
                </div>
            `;
        });
        document.getElementById('ads-list').innerHTML = html || 'Ничего не найдено';
    }

    async function viewAd(id) {
        const doc = await db.collection('ads').doc(id).get();
        const ad = doc.data();
        showPage('view');
        
        let galleryHtml = ad.photos.map(p => `<img src="${p}">`).join('');
        
        document.getElementById('ad-view-content').innerHTML = `
            <div class="ad-gallery">${galleryHtml}</div>
            <div class="ad-info">
                <h1 style="margin:0;">${ad.price} ₽</h1>
                <h2 style="margin:10px 0; font-weight:normal;">${ad.title}</h2>
                <p style="color:var(--gray);">${ad.loc} • ${ad.cat}</p>
                <hr style="opacity:0.1;">
                <p style="white-space: pre-wrap;">${ad.desc}</p>
                <div class="seller-card">
                    <div style="width:50px; height:50px; background:#eee; border-radius:50%; font-size:24px; display:grid; place-items:center;">👤</div>
                    <div>
                        <b>${ad.authorName}</b><br>
                        <small>⭐ 0.0 (0 отзывов)</small>
                    </div>
                </div>
                <button class="btn btn-blue" onclick="startChat('${ad.authorId}', '${ad.title}')">Написать сообщение</button>
            </div>
        `;
    }

    // --- МОДЕРАЦИЯ И АДМИНКА ---
    function loadModerationQueue() {
        // Очередь объявлений
        db.collection('ads').where('status', '==', 'pending').onSnapshot(snap => {
            let html = '<b>Объявления:</b><br>';
            snap.forEach(doc => {
                const ad = doc.data();
                html += `<div style="padding:5px; border-bottom:1px solid #ccc;">
                    ${ad.title} | <button onclick="modAd('${doc.id}', 'active')">✅</button> 
                    <button onclick="modAd('${doc.id}', 'rejected')">❌</button>
                </div>`;
            });
            document.getElementById('mod-list').innerHTML = html;
        });

        // Очередь аватарок
        db.collection('users').where('avatarStatus', '==', 'pending').onSnapshot(snap => {
            snap.forEach(doc => {
                const u = doc.data();
                const div = document.createElement('div');
                div.innerHTML = `Аватар ${u.name}: <img src="${u.pendingAvatar}" style="width:30px;"> 
                <button onclick="modAvatar('${doc.id}', true)">✅</button>`;
                document.getElementById('mod-list').appendChild(div);
            });
        });
    }

    function modAd(id, s) { db.collection('ads').doc(id).update({status: s}); }

    async function uploadAvatar(input) {
        const url = await uploadToImgBB(input.files[0]);
        await db.collection('users').doc(currentUser.uid).update({
            pendingAvatar: url,
            avatarStatus: 'pending'
        });
        alert('Фото отправлено модератору!');
    }

    async function modAvatar(uid, ok) {
        const u = (await db.collection('users').doc(uid).get()).data();
        if(ok) {
            await db.collection('users').doc(uid).update({
                avatar: u.pendingAvatar,
                avatarStatus: 'active'
            });
        }
    }

    // --- ПРОФИЛЬ ---
    async function loadProfile() {
        db.collection('ads').where('authorId', '==', currentUser.uid).onSnapshot(snap => {
            let html = '';
            snap.forEach(doc => {
                const ad = doc.data();
                let color = ad.status === 'active' ? 'black' : (ad.status === 'pending' ? '#ff9500' : 'red');
                html += `
                    <div class="seller-card" style="justify-content:space-between">
                        <div style="display:flex; gap:10px; align-items:center;">
                            <img src="${ad.photos[0]}" style="width:50px; height:50px; object-fit:cover; border-radius:8px;">
                            <div>
                                <b>${ad.title}</b><br>
                                <small style="color:${color}">${ad.status.toUpperCase()}</small>
                            </div>
                        </div>
                        <button class="btn btn-red" style="width:40px; padding:5px;" onclick="deleteAd('${doc.id}')">🗑️</button>
                    </div>
                `;
            });
            document.getElementById('my-ads-list').innerHTML = html || 'У вас нет объявлений';
        });
    }

    function deleteAd(id) { if(confirm('Удалить?')) db.collection('ads').doc(id).delete(); }

    function editName() {
        const n = prompt("Новое имя:");
        if(n) db.collection('users').doc(currentUser.uid).update({name: n});
    }

    // --- ЧАТЫ ---
    function openSupport() {
        currentChatId = "support_" + currentUser.uid;
        document.getElementById('chat-header').innerText = "Поддержка";
        openModal('modal-chat');
        listenMessages();
    }

    function startChat(otherId, title) {
        currentChatId = [currentUser.uid, otherId].sort().join("_");
        document.getElementById('chat-header').innerText = title;
        openModal('modal-chat');
        listenMessages();
    }

    function listenMessages() {
        db.collection('chats').doc(currentChatId).collection('messages').orderBy('time').onSnapshot(snap => {
            let html = '';
            snap.forEach(m => {
                const d = m.data();
                const isMy = d.senderId === currentUser.uid;
                html += `<div class="msg ${isMy ? 'my' : 'other'}">${d.text}</div>`;
            });
            const win = document.getElementById('chat-messages');
            win.innerHTML = html;
            win.scrollTop = win.scrollHeight;
        });
    }

    async function sendMessage() {
        const input = document.getElementById('chat-input');
        if(!input.value) return;
        await db.collection('chats').doc(currentChatId).collection('messages').add({
            text: input.value,
            senderId: currentUser.uid,
            time: new Date()
        });
        input.value = '';
    }

    // --- ПОИСК ---
    function searchAds() {
        const q = document.getElementById('searchInput').value.toLowerCase();
        const filtered = allAds.filter(a => a.title.toLowerCase().includes(q) || a.desc.toLowerCase().includes(q));
        renderAds(filtered);
    }

    // --- ВСПОМОГАТЕЛЬНОЕ ---
    function showPage(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
        document.getElementById('page-'+id).classList.add('active-page');
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
    }
    function openModal(id) { document.getElementById(id).style.display = 'flex'; }
    function closeModal(id) { document.getElementById(id).style.display = 'none'; }
</script>
</body>
</html>
